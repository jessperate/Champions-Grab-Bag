<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataViz — AirOps</title>
  <style>
    @font-face { font-family: 'Serrif VF'; src: url('fonts/SerrifVF.ttf') format('truetype'); font-weight: 100 900; }
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-Medium.ttf') format('truetype'); font-weight: 500; }
    @font-face { font-family: 'Saans'; src: url('fonts/Saans-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'Saans Mono'; src: url('fonts/SaansMono-Medium.ttf') format('truetype'); font-weight: 500; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Saans', 'Helvetica Neue', sans-serif; font-size: 13px; background: #f0f0ee; color: #000d05; display: flex; }

    /* ── Sidebar ── */
    .sidebar {
      width: 272px; flex-shrink: 0;
      background: #fff; border-right: 1px solid #d4e8da;
      display: flex; flex-direction: column;
      height: 100vh; overflow-y: auto;
    }
    .sidebar-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid #d4e8da;
      position: sticky; top: 0; background: #fff; z-index: 10;
    }
.sidebar-title { font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #676c79; }

    .control-section { padding: 16px; border-bottom: 1px solid #ecedef; }
    .control-label {
      font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; color: #676c79;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .control-label .count { color: #a5aab6; }
    .field-label {
      font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 10px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; color: #a5aab6; margin-bottom: 5px; display: block;
    }
    .field-group { margin-bottom: 12px; }
    .field-group:last-child { margin-bottom: 0; }

    input[type="text"], textarea {
      width: 100%; padding: 8px 10px;
      font-family: 'Saans', sans-serif; font-size: 13px; color: #000d05;
      background: #f8fffb; border: 1px solid #d4e8da; outline: none;
      border-radius: 0; transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus { border-color: #008c44; }
    textarea { min-height: 100px; resize: vertical; line-height: 1.5; font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 12px; }

    /* ── Chart type grid ── */
    .chart-type-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .chart-type-btn {
      width: 52px; cursor: pointer; text-align: center;
      border: 2px solid #ecedef; background: #fff; padding: 0; transition: all 0.15s;
    }
    .chart-type-btn:hover { border-color: #008c44; }
    .chart-type-btn.active { border-color: #008c44; background: #f8fffb; }
    .chart-thumb { width: 52px; height: 44px; display: block; }
    .chart-type-label {
      font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 9px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; color: #676c79;
      padding: 4px 2px; display: block; line-height: 1.2;
    }
    .chart-type-btn.active .chart-type-label { color: #008c44; }

    /* ── Toggle ── */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .toggle-row:last-child { margin-bottom: 0; }
    .toggle-row span { font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #676c79; }
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #d4e8da; cursor: pointer; transition: 0.2s; }
    .toggle input:checked + .toggle-slider { background: #000d05; }
    .toggle-slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; transition: 0.2s; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    /* ── Color mode ── */
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .mode-btn {
      padding: 8px 4px; border: 1px solid #d4e8da; background: #fff;
      font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; color: #676c79; cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn:hover { border-color: #008c44; }
    .mode-btn.active { background: #000d05; color: #fff; border-color: #000d05; }

    /* ── Highlight ── */
    .highlight-row { display: flex; align-items: center; gap: 8px; }
    select {
      flex: 1; padding: 7px 8px;
      font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      letter-spacing: 0.04em; text-transform: uppercase;
      background: #f8fffb; border: 1px solid #d4e8da; color: #000d05;
      border-radius: 0; outline: none; cursor: pointer; appearance: none;
    }

    /* ── Export sizes ── */
    .size-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .size-btn {
      padding: 8px; border: 1px solid #d4e8da; background: #fff; cursor: pointer;
      text-align: center; transition: all 0.15s;
    }
    .size-btn:hover { border-color: #008c44; }
    .size-btn.active { border-color: #008c44; background: #f8fffb; }
    .size-dims { font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; color: #000d05; display: block; }
    .size-label { font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 10px; color: #008c44; text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── Download ── */
    .sidebar-footer { padding: 16px; margin-top: auto; border-top: 1px solid #ecedef; }
    .download-btn {
      width: 100%; padding: 12px; background: #000d05; color: #fff; border: none;
      font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 12px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .download-btn:hover { background: #002910; }
    .download-btn:active { background: #008c44; }
    .download-btn.loading { opacity: 0.6; pointer-events: none; }

    /* ── Preview area ── */
    .preview-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .preview-topbar {
      background: #fff; border-bottom: 1px solid #d4e8da;
      padding: 0 20px; height: 46px;
      display: flex; align-items: center; gap: 16px;
      font-family: 'Saans Mono', 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; color: #a5aab6;
      flex-shrink: 0;
    }
    .preview-topbar span { color: #000d05; }
    .preview-topbar .sep { color: #d4e8da; }
    .fonts-badge {
      margin-left: auto; padding: 4px 10px; border: 1px solid #d4e8da;
      color: #008c44; font-size: 10px; letter-spacing: 0.08em;
    }

    .preview-stage {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 32px; overflow: hidden;
      background: #e8e8e6;
      background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .chart-preview-wrap {
      display: flex; align-items: center; justify-content: center;
      max-width: 100%; max-height: 100%;
    }
    #chart-canvas {
      background: #fff;
      box-shadow: 0 4px 32px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08);
      flex-shrink: 0;
      overflow: hidden;
    }
    #chart-canvas svg { display: block; }

    /* ── Painting grid ── */
    .painting-grid { display: flex; gap: 4px; flex-wrap: wrap; }
    .painting-btn {
      width: 48px; height: 38px; cursor: pointer; border: 2px solid #ecedef;
      padding: 0; background: none; overflow: hidden; flex-shrink: 0; transition: border-color 0.15s;
    }
    .painting-btn:hover { border-color: #008c44; }
    .painting-btn.active { border-color: #EEFF8C; box-shadow: 0 0 0 1px #8a9600; }
    .painting-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .painting-btn.none-btn {
      background: #f0f0ee; display: flex; align-items: center; justify-content: center;
      font-family: 'Saans Mono', monospace; font-size: 9px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; color: #676c79;
    }
    .painting-btn.none-btn.active { background: #000d05; color: #fff; border-color: #000d05; }
    .painting-grid.disabled { opacity: 0.4; pointer-events: none; }

    /* ── Carousel ── */
    .carousel-slide-list { display: flex; flex-direction: column; gap: 4px; }
    .carousel-slide-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border: 1px solid #ecedef; cursor: pointer; background: #fff; transition: all 0.15s;
    }
    .carousel-slide-item:hover { border-color: #008c44; }
    .carousel-slide-item.active { border-color: #000d05; background: #f8fffb; }
    .carousel-slide-num { font-family: 'Saans Mono', monospace; font-size: 10px; font-weight: 500; color: #a5aab6; width: 14px; flex-shrink: 0; }
    .carousel-slide-label { font-family: 'Saans Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #676c79; flex: 1; }
    .carousel-slide-item.active .carousel-slide-label { color: #000d05; }
    .carousel-slide-remove { font-size: 14px; color: #d4e8da; cursor: pointer; line-height: 1; padding: 0 2px; background: none; border: none; }
    .carousel-slide-remove:hover { color: #c84040; }
    .add-slide-btn {
      width: 100%; margin-top: 6px; padding: 8px; border: 1px dashed #d4e8da; background: #fff; cursor: pointer;
      font-family: 'Saans Mono', monospace; font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; color: #008c44; transition: all 0.15s;
    }
    .add-slide-btn:hover { border-color: #008c44; background: #f8fffb; }
    .colorway-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .colorway-btn {
      width: 40px; height: 28px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: border-color 0.15s;
    }
    .colorway-btn:hover { border-color: #008c44; }
    .colorway-btn.active { border-color: #EEFF8C; box-shadow: 0 0 0 1px #8a9600; }
    .brand-hex-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .brand-hex-row input[type="color"] { width: 28px; height: 28px; padding: 0; border: 1px solid #333; cursor: pointer; flex-shrink: 0; background: none; }
    .brand-hex-row input[type="text"] { flex: 1; min-width: 0; font-size: 12px; font-family: 'DM Mono', monospace; background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 4px 6px; }
    .brand-hex-row button { background: none; border: 1px solid #444; color: #aaa; cursor: pointer; padding: 2px 6px; font-size: 11px; flex-shrink: 0; }
    .brand-hex-row button:hover { border-color: #888; color: #eee; }
    .carousel-mini-chart-grid { display: flex; gap: 4px; flex-wrap: wrap; }
    .carousel-mini-chart-btn {
      padding: 5px 8px; border: 1px solid #ecedef; background: #fff; cursor: pointer;
      font-family: 'Saans Mono', monospace; font-size: 10px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; color: #676c79; transition: all 0.15s;
    }
    .carousel-mini-chart-btn:hover { border-color: #008c44; }
    .carousel-mini-chart-btn.active { background: #000d05; color: #fff; border-color: #000d05; }
  </style>
</head>
<body>

<!-- ── Sidebar ────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <svg width="56" height="18" viewBox="0 0 784 252" fill="none" xmlns="http://www.w3.org/2000/svg">

    </svg>
    <span class="sidebar-title">DataViz</span>
  </div>

  <!-- Chart type -->
  <div class="control-section">
    <div class="control-label">Chart Type <span class="count">7</span></div>
    <div class="chart-type-grid" id="chart-type-grid">
      <button class="chart-type-btn active" data-type="bar">
        <svg class="chart-thumb" viewBox="0 0 52 44" fill="none">
          <rect x="4" y="28" width="8" height="12" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
          <rect x="15" y="18" width="8" height="22" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
          <rect x="26" y="10" width="8" height="30" fill="#EEFF8C" stroke="#8a9600" stroke-width="0.8"/>
          <rect x="37" y="22" width="8" height="18" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
          <line x1="4" y1="40" x2="48" y2="40" stroke="#d4e8da" stroke-width="1"/>
        </svg>
        <span class="chart-type-label">Bar</span>
      </button>
      <button class="chart-type-btn" data-type="line">
        <svg class="chart-thumb" viewBox="0 0 52 44" fill="none">
          <polyline points="4,36 14,24 24,28 34,12 44,16" stroke="#008c44" stroke-width="2" fill="none" stroke-linejoin="round"/>
          <circle cx="4" cy="36" r="2.5" fill="#008c44"/>
          <circle cx="14" cy="24" r="2.5" fill="#008c44"/>
          <circle cx="24" cy="28" r="2.5" fill="#008c44"/>
          <circle cx="34" cy="12" r="2.5" fill="#EEFF8C" stroke="#8a9600" stroke-width="1"/>
          <circle cx="44" cy="16" r="2.5" fill="#008c44"/>
          <line x1="4" y1="40" x2="48" y2="40" stroke="#d4e8da" stroke-width="1"/>
        </svg>
        <span class="chart-type-label">Line</span>
      </button>
      <button class="chart-type-btn" data-type="stat">
        <svg class="chart-thumb" viewBox="0 0 52 44" fill="none">
          <text x="26" y="30" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="400" fill="#000d05">3x</text>
          <rect x="14" y="34" width="24" height="6" fill="#EEFF8C"/>
          <text x="26" y="39" text-anchor="middle" font-family="monospace" font-size="5" fill="#000d05" font-weight="700">GROWTH</text>
        </svg>
        <span class="chart-type-label">Stat</span>
      </button>
      <button class="chart-type-btn" data-type="ranked">
        <svg class="chart-thumb" viewBox="0 0 52 44" fill="none">
          <rect x="12" y="6" width="32" height="7" fill="#EEFF8C" stroke="#8a9600" stroke-width="0.8"/>
          <rect x="12" y="17" width="22" height="7" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
          <rect x="12" y="28" width="14" height="7" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
          <text x="9" y="12" text-anchor="end" font-family="monospace" font-size="6" fill="#676c79">1</text>
          <text x="9" y="23" text-anchor="end" font-family="monospace" font-size="6" fill="#676c79">2</text>
          <text x="9" y="34" text-anchor="end" font-family="monospace" font-size="6" fill="#676c79">3</text>
        </svg>
        <span class="chart-type-label">Ranked</span>
      </button>
      <button class="chart-type-btn" data-type="table">
        <svg class="chart-thumb" viewBox="0 0 52 44" fill="none">
          <rect x="4" y="4" width="44" height="9" fill="#000d05"/>
          <rect x="4" y="14" width="44" height="7" fill="#f8fffb"/>
          <rect x="4" y="22" width="44" height="7" fill="#fff"/>
          <rect x="4" y="30" width="44" height="7" fill="#f8fffb"/>
          <line x1="4" y1="4" x2="4" y2="37" stroke="#d4e8da" stroke-width="0.8"/>
          <line x1="48" y1="4" x2="48" y2="37" stroke="#d4e8da" stroke-width="0.8"/>
          <line x1="4" y1="37" x2="48" y2="37" stroke="#d4e8da" stroke-width="0.8"/>
        </svg>
        <span class="chart-type-label">Table</span>
      </button>
      <button class="chart-type-btn" data-type="pie">
        <svg class="chart-thumb" viewBox="0 0 52 44" fill="none">
          <path d="M26 22 L26 8 A14 14 0 0 1 37.3 30.2 Z" fill="#EEFF8C" stroke="#8a9600" stroke-width="0.8"/>
          <path d="M26 22 L37.3 30.2 A14 14 0 0 1 17.8 33.3 Z" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
          <path d="M26 22 L17.8 33.3 A14 14 0 0 1 12.7 17.7 Z" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
          <path d="M26 22 L12.7 17.7 A14 14 0 0 1 20.0 9.4 Z" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
          <path d="M26 22 L20.0 9.4 A14 14 0 0 1 26 8 Z" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
        </svg>
        <span class="chart-type-label">Pie</span>
      </button>
      <button class="chart-type-btn" data-type="carousel">
        <svg class="chart-thumb" viewBox="0 0 52 44" fill="none">
          <rect x="10" y="4"  width="34" height="26" rx="1" fill="#CCFFE0" stroke="#002910" stroke-width="0.8"/>
          <rect x="5"  y="9"  width="34" height="26" rx="1" fill="#EEFF8C" stroke="#8a9600" stroke-width="0.8"/>
          <rect x="0"  y="14" width="34" height="26" rx="1" fill="#fff"    stroke="#002910" stroke-width="0.8"/>
          <text x="17" y="29" text-anchor="middle" font-family="monospace" font-size="7" fill="#676c79">SLIDE</text>
        </svg>
        <span class="chart-type-label">Carousel</span>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="control-section" id="section-content">
    <div class="control-label">Content</div>
    <div class="field-group">
      <label class="field-label">Title</label>
      <input type="text" id="chart-title" placeholder="AI Citations by Quarter">
    </div>
    <div class="field-group">
      <label class="field-label">Subcopy</label>
      <input type="text" id="chart-subcopy" placeholder="Optional body copy below the title">
    </div>
    <div class="field-group">
      <label class="field-label">Subtitle / Source</label>
      <input type="text" id="chart-subtitle" placeholder="Source: AirOps Research, 2026">
    </div>
  </div>

  <!-- Data -->
  <div class="control-section" id="section-data">

// ── Brand colorway generator ──────────────────────────────────────────────────
function dvHexToHsl(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0; const l = (max+min)/2;
  if (max !== min) {
    const d = max-min; s = l>0.5 ? d/(2-max-min) : d/(max+min);
    if (max===r) h=((g-b)/d+(g<b?6:0))/6; else if (max===g) h=((b-r)/d+2)/6; else h=((r-g)/d+4)/6;
  }
  return [h*360, s*100, l*100];
}
function dvHsl(h,s,l) {
  s=Math.max(0,Math.min(100,s))/100; l=Math.max(0,Math.min(100,l))/100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12; return Math.round((l-a*Math.max(-1,Math.min(k-3,9-k,1)))*255).toString(16).padStart(2,'0');};
  return `#${f(0)}${f(8)}${f(4)}`;
}
function generateBrandColorways(hex) {
  if (!hex || !/^#[0-9a-fA-F]{6}$/.test(hex)) return null;
  const [h, rawS, rawL] = dvHexToHsl(hex);
  const aS = Math.max(55, Math.min(rawS, 88));
  const aL = Math.max(33, Math.min(rawL, 55));
  const accent      = dvHsl(h, aS, aL);
  const accentDark  = dvHsl(h, aS, Math.max(aL-14, 16));
  const lightBg     = dvHsl(h, 12, 98);
  const lightText   = dvHsl(h, aS, 7);
  const lightFill   = dvHsl(h, 18, 90);
  const mintBg      = dvHsl(h, 16, 88);
  const darkBg      = dvHsl(h, Math.min(aS,65), 7);
  const darkBg2     = dvHsl(h, Math.min(aS,50), 13);
  const darkText    = dvHsl(h, 12, 92);
  const accentBright= dvHsl(h, 92, Math.min(aL+14, 64));
  const muted       = dvHsl(h, 18, 48);

  const light = {
    bg: lightBg, title: lightText, subtitle: muted,
    barFill: lightFill, barStroke: accent, barAccent: accent, barAccentStroke: accentDark,
    lineStroke: accent, axisTick: muted, axisLine: 'rgba(0,0,0,0.12)', gridLine: 'rgba(0,0,0,0.06)',
    tableBg: lightBg, tableRowAlt: 'rgba(0,0,0,0.04)', tableHeader: accent, tableHeaderText: '#ffffff',
    tableText: lightText, tableSubText: muted, pillBg: accent, pillText: '#ffffff',
    logoFill: lightText, valueText: lightText, splitPanelBg: accent,
  };
  const dark = {
    bg: darkBg, title: darkText, subtitle: dvHsl(h, 18, 62),
    barFill: darkBg2, barStroke: accentBright, barAccent: accentBright, barAccentStroke: accent,
    lineStroke: accentBright, axisTick: dvHsl(h, 18, 55), axisLine: 'rgba(255,255,255,0.12)', gridLine: 'rgba(255,255,255,0.06)',
    tableBg: darkBg, tableRowAlt: 'rgba(255,255,255,0.04)', tableHeader: darkBg2, tableHeaderText: accentBright,
    tableText: darkText, tableSubText: dvHsl(h, 18, 62), pillBg: accentBright, pillText: darkBg,
    logoFill: darkText, valueText: darkText, splitPanelBg: darkBg2,
  };
  return { light, dark, lightBg, darkBg: darkBg };
}

let _dvBrandHex = '';
function applyDvBrandColor(hex) {
  _dvBrandHex = hex;

const paintingCache = {};

function prefetchPaintings() {
  return Promise.all(PAINTINGS.map(p => new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = img.naturalWidth; cv.height = img.naturalHeight;
      cv.getContext('2d').drawImage(img, 0, 0);
      try { paintingCache[p.key] = cv.toDataURL('image/jpeg', 0.85); }
      catch(e) { paintingCache[p.key] = p.file; }
      resolve();
    };
    img.onerror = () => { paintingCache[p.key] = p.file; resolve(); };
    img.src = p.file;
  })));
}

// ── Data parsing ──────────────────────────────────────────────────────────────
function parseData(raw, type) {
  if (type === 'table') {
    const lines = raw.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (!lines.length) return { headers: ['Metric', 'Value', 'Change'], rows: [['AI Citations', '245', '+34%'], ['Page Views', '12.4K', '+18%'], ['Conversions', '3.2%', '+5%']] };
    const headers = lines[0].split(',').map(h => h.trim());
    const rows = lines.slice(1).map(l => l.split(',').map(c => c.trim()));
    return { headers, rows };
  }
  if (type === 'stat') {
    const lines = raw.trim().split('\n').map(l => l.trim()).filter(Boolean);
    const getValue = (prefix) => {
      const line = lines.find(l => l.toLowerCase().startsWith(prefix.toLowerCase() + ':'));
      return line ? line.slice(line.indexOf(':') + 1).trim() : '';
    };
    const plain = lines[0] || '3.4x';
    return {
      value: getValue('value') || plain,
      label: getValue('label') || lines[1] || 'Increase in citations',
      sub: getValue('sub') || getValue('comparison') || lines[2] || '',
    };
  }
  // key: value pairs for bar/line/ranked
  const lines = raw.trim().split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) {
    return {
      labels: ['Q1', 'Q2', 'Q3', 'Q4'],
      values: [45, 67, 89, 120],
    };
  }
  const labels = [], values = [];
  for (const line of lines) {
    const sep = line.lastIndexOf(':');
    if (sep < 0) continue;
    const label = line.slice(0, sep).trim();
    const raw_val = line.slice(sep + 1).trim().replace(/[%,]/g, '');
    const val = parseFloat(raw_val);
    if (!isNaN(val)) { labels.push(label); values.push(val); }
  }
  if (type === 'bar' || type === 'ranked') {
    const sorted = labels.map((l, i) => ({ l, v: values[i] }))
      .sort((a, b) => b.v - a.v);
    labels.splice(0, labels.length, ...sorted.map(s => s.l));
    values.splice(0, values.length, ...sorted.map(s => s.v));
  }
  return labels.length ? { labels, values } : { labels: ['Q1', 'Q2', 'Q3', 'Q4'], values: [45, 67, 89, 120] };
}

// ── Logo SVG ──────────────────────────────────────────────────────────────────

// ── Chart renderers ───────────────────────────────────────────────────────────

function renderBar(data, C, W, H, cfg) {
  const { labels, values } = data;
  const n = labels.length;
  const pl = 56, pr = 32;
  const pb = Math.round(Math.max(80, Math.min(90, H * 0.112))) + (cfg.extraBottom || 0);
  const pt_base = Math.round(Math.max(76, Math.min(100, H * 0.125)));
  const pt = (cfg.basePt ?? pt_base) + (cfg.ptOffset || 0);
  const chartW = W - pl - pr;
  const chartH = H - pt - pb;
  const maxVal = Math.max(...values);
  const hiIdx = cfg.highlightIndex >= 0 && cfg.highlightIndex < n ? cfg.highlightIndex : values.indexOf(maxVal);

  const barW = Math.min(chartW / n * 0.85, 120);
  const gap = chartW / n;

  // Grid lines
  const ticks = 4;
  let gridLines = '';
  for (let i = 0; i <= ticks; i++) {
    const y = pt + chartH - (i / ticks) * chartH;
    const val = Math.round((i / ticks) * maxVal);
    gridLines += `<line x1="${pl}" y1="${y}" x2="${W - pr}" y2="${y}" stroke="${C.gridLine}" stroke-width="1"/>
    <text x="${pl - 8}" y="${y + 4}" text-anchor="end" font-family="'Saans Mono','DM Mono',monospace" font-size="12" fill="${C.axisTick}">${val}</text>`;
  }

  // Bars
  let bars = '';
  for (let i = 0; i < n; i++) {
    const x = pl + i * gap + gap / 2 - barW / 2;
    const bh = (values[i] / maxVal) * chartH;
    const y = pt + chartH - bh;
    const isHi = i === hiIdx;
    const fill = isHi ? C.barAccent : C.barFill;
    const stroke = isHi ? C.barAccentStroke : C.barStroke;
    const valueLabelY = Math.max(pt + 15, y - 6);
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" fill="${fill}" stroke="${stroke}" stroke-width="0.8"/>
    <text x="${x + barW / 2}" y="${valueLabelY}" text-anchor="middle" font-family="'Saans Mono','DM Mono',monospace" font-size="13" font-weight="500" fill="${C.valueText}">${values[i]}</text>
    <text x="${x + barW / 2}" y="${pt + chartH + 18}" text-anchor="middle" font-family="'Saans Mono','DM Mono',monospace" font-size="13" fill="${C.axisTick}">${labels[i].toUpperCase()}</text>`;
  }

  return `${gridLines}<line x1="${pl}" y1="${pt}" x2="${pl}" y2="${pt + chartH}" stroke="${C.axisLine}" stroke-width="1"/>
  <line x1="${pl}" y1="${pt + chartH}" x2="${W - pr}" y2="${pt + chartH}" stroke="${C.axisLine}" stroke-width="1"/>
  ${bars}`;
}

function renderLine(data, C, W, H, cfg) {
  const { labels, values } = data;
  const n = labels.length;
  const pl = 56, pr = 32;
  const pb = Math.round(Math.max(80, Math.min(90, H * 0.112))) + (cfg.extraBottom || 0);
  const pt_base = Math.round(Math.max(76, Math.min(100, H * 0.125)));
  const pt = (cfg.basePt ?? pt_base) + (cfg.ptOffset || 0);
  const chartW = W - pl - pr;
  const chartH = H - pt - pb;
  const maxVal = Math.max(...values) * 1.05;
  const hiIdx = cfg.highlightIndex >= 0 && cfg.highlightIndex < n ? cfg.highlightIndex : values.indexOf(Math.max(...values));

  const pts = values.map((v, i) => [pl + (i / (n - 1 || 1)) * chartW, pt + chartH - (v / maxVal) * chartH]);

  // Grid
  let grid = '';
  for (let i = 0; i <= 4; i++) {
    const y = pt + chartH - (i / 4) * chartH;
    const val = Math.round((i / 4) * maxVal);
    grid += `<line x1="${pl}" y1="${y}" x2="${W - pr}" y2="${y}" stroke="${C.gridLine}" stroke-width="1"/>
    <text x="${pl - 8}" y="${y + 4}" text-anchor="end" font-family="'Saans Mono','DM Mono',monospace" font-size="12" fill="${C.axisTick}">${val}</text>`;
  }

  const polyline = pts.map(([x, y]) => `${x},${y}`).join(' ');

  // Fill area under line
  const fillPts = [`${pl},${pt + chartH}`, ...pts.map(([x, y]) => `${x},${y}`), `${W - pr},${pt + chartH}`].join(' ');
  const fillColor = cfg.colorMode === 'dark' ? 'rgba(0,230,118,0.08)' : 'rgba(204,255,224,0.5)';

  let dots = '';
  pts.forEach(([x, y], i) => {
    const isHi = i === hiIdx;
    dots += `<circle cx="${x}" cy="${y}" r="${isHi ? 6 : 4}" fill="${isHi ? C.barAccent : C.lineStroke}" stroke="${C.bg}" stroke-width="2"/>`;
    if (isHi) dots += `<text x="${x}" y="${Math.max(pt + 14, y - 14)}" text-anchor="middle" font-family="'Saans Mono','DM Mono',monospace" font-size="13" font-weight="500" fill="${C.valueText}">${values[i]}</text>`;
  });

  // X labels
  let xLabels = '';
  pts.forEach(([x], i) => {
    xLabels += `<text x="${x}" y="${pt + chartH + 18}" text-anchor="middle" font-family="'Saans Mono','DM Mono',monospace" font-size="13" fill="${C.axisTick}">${labels[i].toUpperCase()}</text>`;
  });

  return `${grid}
  <polygon points="${fillPts}" fill="${fillColor}"/>
  <polyline points="${polyline}" stroke="${C.lineStroke}" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="${pl}" y1="${pt}" x2="${pl}" y2="${pt + chartH}" stroke="${C.axisLine}" stroke-width="1"/>
  <line x1="${pl}" y1="${pt + chartH}" x2="${W - pr}" y2="${pt + chartH}" stroke="${C.axisLine}" stroke-width="1"/>
  ${dots}${xLabels}`;
}

function renderRanked(data, C, W, H, cfg) {
  const { labels, values } = data;
  const n = Math.min(labels.length, 8);
  const pl = 56, pr = 48;
  const pb = Math.round(Math.max(56, Math.min(80, H * 0.100))) + (cfg.extraBottom || 0);
  const pt_base = Math.round(Math.max(68, Math.min(90, H * 0.112)));
  const pt = (cfg.basePt ?? pt_base) + (cfg.ptOffset || 0);
  const chartH = H - pt - pb;
  const rowH = chartH / n;
  const maxVal = Math.max(...values);
  const maxBarW = W - pl - pr - 70;
  const hiIdx = cfg.highlightIndex >= 0 ? cfg.highlightIndex : 0;

  // X-axis gridlines + scale labels
  const ticks = 4;
  let gridLines = '';
  for (let i = 0; i <= ticks; i++) {
    const x = Math.round(pl + (i / ticks) * maxBarW);
    const val = Math.round((i / ticks) * maxVal);
    gridLines += `<line x1="${x}" y1="${pt}" x2="${x}" y2="${pt + chartH}" stroke="${C.gridLine}" stroke-width="1"/>`;
    gridLines += `<text x="${x}" y="${pt + chartH + 16}" text-anchor="middle" font-family="'Saans Mono','DM Mono',monospace" font-size="11" fill="${C.axisTick}">${val}</text>`;
  }

  // Axis lines
  const yAxis = `<line x1="${pl}" y1="${pt}" x2="${pl}" y2="${pt + chartH}" stroke="${C.axisLine}" stroke-width="1"/>`;
  const xAxis = `<line x1="${pl}" y1="${pt + chartH}" x2="${pl + maxBarW}" y2="${pt + chartH}" stroke="${C.axisLine}" stroke-width="1"/>`;

  let rows = '';
  for (let i = 0; i < n; i++) {
    const y = pt + i * rowH;
    const bw = (values[i] / maxVal) * maxBarW;
    const isHi = i === hiIdx;
    const fill = isHi ? C.barAccent : C.barFill;
    const stroke = isHi ? C.barAccentStroke : C.barStroke;
    const barY = y + rowH * 0.2;
    const barH = rowH * 0.5;

    rows += `
    <text x="${pl - 8}" y="${barY + barH * 0.7}" text-anchor="end" font-family="'Saans Mono','DM Mono',monospace" font-size="13" font-weight="500" fill="${C.axisTick}">${i + 1}</text>
    <rect x="${pl}" y="${barY}" width="${bw}" height="${barH}" fill="${fill}" stroke="${stroke}" stroke-width="0.8"/>
    <text x="${pl + bw + 8}" y="${barY + barH * 0.72}" font-family="'Saans Mono','DM Mono',monospace" font-size="13" font-weight="500" fill="${C.valueText}">${values[i]}</text>
    <text x="${pl}" y="${barY + barH + 13}" font-family="'Saans Mono','DM Mono',monospace" font-size="12" fill="${C.axisTick}">${labels[i].toUpperCase()}</text>`;
  }
  return `${gridLines}${yAxis}${xAxis}${rows}`;
}

function renderStat(data, C, W, H, cfg) {
  const { value, label, sub } = data;
  const cx = W / 2;
  const safeTop = cfg.extraTop || 0;
  const safeBottom = cfg.extraBottom || 0;
  // Responsive font size — scale down on short canvases
  const fontSize = Math.min(W * 0.30, H * 0.44, 220);
  // Center between title area bottom and bottom chrome top
  const titleClear = safeTop + 80;
  const chromeClear = H - safeBottom - 56;
  const cy = (titleClear + chromeClear) / 2;

  let out = `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
    font-family="'Serrif VF',Georgia,serif" font-size="${fontSize}px"
    font-weight="400" letter-spacing="-0.02em" fill="${C.title}">${value}</text>`;

  const pillH = 36, pillPad = 18;
  const labelY = cy + Math.min(W * 0.12, 110);
  out += `<rect x="${cx - label.length * 5.5 - pillPad}" y="${labelY}" width="${label.length * 11 + pillPad * 2}" height="${pillH}" fill="${C.pillBg}"/>
  <text x="${cx}" y="${labelY + pillH * 0.65}" text-anchor="middle"
    font-family="'Saans Mono','DM Mono',monospace" font-size="18" font-weight="500"
    letter-spacing="0.08em" text-transform="uppercase" fill="${C.pillText}">${label.toUpperCase()}</text>`;

  if (sub) {
    out += `<text x="${cx}" y="${labelY + pillH + 28}" text-anchor="middle"
      font-family="'Saans Mono','DM Mono',monospace" font-size="16" fill="${C.subtitle}">${sub}</text>`;
  }
  return out;
}

function renderTable(data, C, W, H, cfg) {
  const { headers, rows } = data;
  const n = Math.min(rows.length, 8);
  const pl = 40, pr = 40;
  const pb = Math.round(Math.max(56, Math.min(80, H * 0.100))) + (cfg.extraBottom || 0);
  const pt_base = Math.round(Math.max(68, Math.min(90, H * 0.112)));
  const pt = (cfg.basePt ?? pt_base) + (cfg.ptOffset || 0);
  const tableW = W - pl - pr;
  const headerH = 40;
  const availH = H - pt - pb;
  const rowH = Math.max(32, Math.min(60, (availH - headerH) / n));
  const colW = tableW / headers.length;

  let out = `<rect x="${pl}" y="${pt}" width="${tableW}" height="${headerH}" fill="${C.tableHeader}"/>`;
  headers.forEach((h, i) => {
    out += `<text x="${pl + i * colW + 12}" y="${pt + headerH * 0.65}"
      font-family="'Saans Mono','DM Mono',monospace" font-size="13" font-weight="500"
      letter-spacing="0.08em" fill="${C.tableHeaderText}">${h.toUpperCase()}</text>`;
  });

  for (let r = 0; r < n; r++) {
    const rowY = pt + headerH + r * rowH;
    const rowBg = r % 2 === 0 ? C.tableBg : C.tableRowAlt;
    out += `<rect x="${pl}" y="${rowY}" width="${tableW}" height="${rowH}" fill="${rowBg}" stroke="${C.border}" stroke-width="0.5"/>`;
    rows[r].forEach((cell, i) => {
      const isFirst = i === 0;
      out += `<text x="${pl + i * colW + 12}" y="${rowY + rowH * 0.65}"
        font-family="'Saans Mono','DM Mono',monospace" font-size="14"
        font-weight="${isFirst ? '500' : '400'}"
        fill="${isFirst ? C.tableText : C.tableSubText}">${cell}</text>`;
    });
  }
  out += `<rect x="${pl}" y="${pt}" width="${tableW}" height="${headerH + n * rowH}" fill="none" stroke="${C.border}" stroke-width="1"/>`;
  return out;
}

// ── Text wrap helpers ─────────────────────────────────────────────────────────
function wrapTextMulti(text, maxWidth, fontSize, maxLines = 5, charScale = 0.52) {
  const maxChars = Math.floor(maxWidth / (fontSize * charScale));
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    const candidate = current ? `${current} ${word}` : word;
    if (candidate.length <= maxChars) {
      current = candidate;
    } else {
      if (current) lines.push(current);
      current = word;
      if (lines.length >= maxLines - 1) break;
    }
  }
  if (current) lines.push(current);
  return lines.slice(0, maxLines);
}

function wrapText(text, maxWidth, fontSize, charScaleFactor = 0.57) {
  const maxChars = Math.floor(maxWidth / (fontSize * charScaleFactor));
  if (text.length <= maxChars) return [text];
  const words = text.split(' ');
  let line1 = '', line2 = '';
  for (const word of words) {
    if ((line1 + (line1 ? ' ' : '') + word).length <= maxChars) {
      line1 += (line1 ? ' ' : '') + word;
    } else {
      line2 += (line2 ? ' ' : '') + word;
    }
  }
  return line2 ? [line1, line2] : [line1];
}

function buildTitleSVG(title, W, C, yOffset = 0) {
  const fontSize = Math.min(W * 0.052, 44);
  const maxWidth = W - 80;
  const lines = wrapText(title, maxWidth, fontSize);
  const lineH = fontSize * 1.2;
  const baseY = 52 + yOffset;
  if (lines.length === 1) {
    return {
      svg: `<text x="40" y="${baseY}" font-family="'Serrif VF',Georgia,serif" font-size="${fontSize}" font-weight="400" letter-spacing="-0.02em" fill="${C.title}">${escSVG(lines[0])}</text>`,
      extraPt: 0,
    };
  }
  return {
    svg: `<text x="40" y="${baseY}" font-family="'Serrif VF',Georgia,serif" font-size="${fontSize}" font-weight="400" letter-spacing="-0.02em" fill="${C.title}">
    <tspan x="40" dy="0">${escSVG(lines[0])}</tspan>
    <tspan x="40" dy="${lineH}">${escSVG(lines[1])}</tspan>
  </text>`,
    extraPt: Math.round(lineH),
  };
}

function buildSubcopySVG(text, W, C, titleBottomY) {
  if (!text) return { svg: '', height: 0 };
  const fontSize = 18;
  const lineH = fontSize * 1.5;
  const lines = wrapTextMulti(text, W - 80, fontSize, 3, 0.48);
  const y = titleBottomY + 32;
  const tspans = lines.map((l, i) => `<tspan x="40" dy="${i === 0 ? 0 : lineH}">${escSVG(l)}</tspan>`).join('');
  return {
    svg: `<text x="40" y="${y}" font-family="'Saans','Helvetica Neue',sans-serif" font-size="${fontSize}" font-weight="400" fill="${C.subtitle}">${tspans}</text>`,
    height: Math.round(lines.length * lineH + 24),
  };
}

function buildSplitTitleSVG(title, panelW, H, titleColor) {
  const fontSize = Math.min(panelW * 0.095, 52);
  const maxWidth = panelW - 72;
  const lines = wrapTextMulti(title, maxWidth, fontSize, 5, 0.50);
  const lineH = fontSize * 1.25;
  const totalH = lines.length * lineH;
  const startY = H * 0.40 - totalH / 2 + fontSize;
  let tspans = lines.map((l, i) =>
    `<tspan x="40" dy="${i === 0 ? 0 : lineH}">${escSVG(l)}</tspan>`
  ).join('');
  return `<text x="40" y="${Math.round(startY)}" font-family="'Serrif VF',Georgia,serif"
    font-size="${fontSize}" font-weight="400" letter-spacing="-0.02em" fill="${titleColor}">${tspans}</text>`;
}

function buildPaintingBackground(key, W, H, forExport) {
  const p = PAINTINGS.find(x => x.key === key);
  if (!p) return '';
  const href = paintingCache[key] || p.file;
  const overlayAlpha = p.overlay;
  return `<image href="${href}" x="0" y="0" width="${W}" height="${H}" preserveAspectRatio="xMidYMid slice"/>
  <rect width="${W}" height="${H}" fill="rgba(0,0,0,${overlayAlpha})"/>`;
}

function renderSplitLayout({ W, H, title, subtitle, data, showLogo, showSource, hiIdx, colorMode, chartType }) {
  const C = COLORS[colorMode];
  const splitX = Math.round(W * 0.40);
  const rightW = W - splitX;

  // Left panel title colors
  const titleColor = colorMode === 'light' ? '#000d05' : '#ffffff';
  const subtitleColor = colorMode === 'light' ? '#676c79' : 'rgba(255,255,255,0.55)';
  const logoFillColor = colorMode === 'light' ? '#001408' : '#ffffff';

  // Left panel background
  const leftBg = `<rect x="0" y="0" width="${splitX}" height="${H}" fill="${C.bg}"/>`;

  // Right panel background
  const rightBg = `<rect x="${splitX}" y="0" width="${rightW}" height="${H}" fill="${C.splitPanelBg}"/>`;

  // Divider line
  const divider = `<line x1="${splitX}" y1="0" x2="${splitX}" y2="${H}" stroke="${C.border}" stroke-width="1"/>`;

  // Split title in left panel
  const titleSVG = buildSplitTitleSVG(title, splitX, H, titleColor);

  // Logo in left panel bottom
  const logoW = splitX * 0.22;
  const logoH = logoW * 291 / 1179;
  const sourceH = showSource ? 20 : 0;
  const logoBottomY = H - 28 - sourceH - (showSource ? 10 : 0);
  const logoBlock = showLogo
    ? `<g transform="translate(${40}, ${logoBottomY - logoH})">${lockupSVG(logoW, logoFillColor)}</g>`
    : '';

  // Source in left panel bottom — below logo
  const sourceBlock = showSource
    ? `<text x="40" y="${H - 28}" font-family="'Saans Mono','DM Mono',monospace" font-size="11"
        font-weight="500" letter-spacing="0.06em" fill="${subtitleColor}">${escSVG(subtitle.toUpperCase())}</text>`
    : '';

  // Bottom accent line above logo/source chrome
  const accentY = logoBottomY - logoH - 10;
  const bottomAccent = `<line x1="40" y1="${accentY}" x2="${splitX - 4}" y2="${accentY}" stroke="${C.border}" stroke-width="1"/>`;

  // Right chart colors
  const chartC = { ...COLORS.dark, bg: C.splitPanelBg, barFill: '#CCFFE0', barStroke: '#00a854' };

  // Render chart in right panel
  const chartCfg = { colorMode: 'dark', highlightIndex: hiIdx, ptOffset: 0, basePt: 60, extraTop: 0, extraBottom: 0 };
  let chartBody = '';
  if (chartType === 'bar')    chartBody = renderBar(data, chartC, rightW, H, chartCfg);
  if (chartType === 'line')   chartBody = renderLine(data, chartC, rightW, H, chartCfg);
  if (chartType === 'ranked') chartBody = renderRanked(data, chartC, rightW, H, chartCfg);
  if (chartType === 'stat')   chartBody = renderStat(data, chartC, rightW, H, chartCfg);
  if (chartType === 'table')  chartBody = renderTable(data, chartC, rightW, H, chartCfg);
  if (chartType === 'pie')    chartBody = renderPie(data, chartC, rightW, H, chartCfg);

  const chartGroup = `<g transform="translate(${splitX},0)">${chartBody}</g>`;

  return `${leftBg}${rightBg}${titleSVG}${bottomAccent}${logoBlock}${sourceBlock}${divider}${chartGroup}`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const W = 800, H = 800 * state.exportH / state.exportW;
  const C = state.paintingKey ? getPaintingColors() : COLORS[state.colorMode];
  const title = document.getElementById('chart-title').value || defaultTitles[state.chartType];
  const subtitle = document.getElementById('chart-subtitle').value || 'Source: AirOps Research, 2026';
  const rawData = document.getElementById('data-input').value;
  const data = parseData(rawData, state.chartType);
  const showLogo = document.getElementById('show-logo').checked;
  const showSource = document.getElementById('show-source').checked;
  const hiVal = document.getElementById('highlight-select').value;
  const hiIdx = hiVal === 'max' ? -1 : parseInt(hiVal);

  // Safe zone for 4:5 portrait (Instagram)
  const is45 = state.exportH === 1350;
  const extraTop = is45 ? Math.round(H * 0.13) : 0;
  const extraBottom = is45 ? Math.round(H * 0.13) : 0;

  let backgroundLayer, svgContent;

  if (state.layoutMode === 'split') {
    backgroundLayer = '';
    svgContent = renderSplitLayout({ W, H, title, subtitle, data,
      showLogo, showSource, hiIdx, colorMode: state.colorMode, chartType: state.chartType });
  } else {
    backgroundLayer = state.paintingKey
      ? buildPaintingBackground(state.paintingKey, W, H, false)
      : `<rect width="${W}" height="${H}" fill="${C.bg}"/>`;

    // Title (with auto-wrap) — shifted into safe zone for portrait
    const { svg: titleBlock, extraPt: extraTitlePt } = buildTitleSVG(title, W, C, extraTop);
    const subcopy = document.getElementById('chart-subcopy').value;
    const { svg: subcopyBlock, height: subcopyHeight } = buildSubcopySVG(subcopy, W, C, 52 + extraTop + extraTitlePt);
    const cfg = { colorMode: state.colorMode, highlightIndex: hiIdx, ptOffset: extraTitlePt + extraTop + subcopyHeight, extraTop, extraBottom };

    // Chart body
    let chartBody = '';
    if (state.chartType === 'bar')    chartBody = renderBar(data, C, W, H, cfg);
    if (state.chartType === 'line')   chartBody = renderLine(data, C, W, H, cfg);
    if (state.chartType === 'ranked') chartBody = renderRanked(data, C, W, H, cfg);
    if (state.chartType === 'stat')   chartBody = renderStat(data, C, W, H, cfg);
    if (state.chartType === 'table')  chartBody = renderTable(data, C, W, H, cfg);
    if (state.chartType === 'pie')    chartBody = renderPie(data, C, W, H, cfg);

    // Source / subtitle
    const sourceBlock = showSource
      ? `<text x="40" y="${H - 28 - extraBottom}" font-family="'Saans Mono','DM Mono',monospace" font-size="12"
          font-weight="500" letter-spacing="0.06em" fill="${C.subtitle}">${escSVG(subtitle.toUpperCase())}</text>`
      : '';

    // Logo
    const logoW = W * 0.10;
    const logoH = logoW * 291 / 1179;
    const logoBlock = showLogo
      ? `<g transform="translate(${W - 56 - logoW}, ${H - 28 - logoH - extraBottom})">${lockupSVG(logoW, C.logoFill)}</g>`
      : '';

    const showBottomAccent = state.chartType === 'stat' || state.chartType === 'pie';
    const bottomAccent = showBottomAccent
      ? `<line x1="40" y1="${H - 28 - logoH - extraBottom - 10}" x2="${W - 40}" y2="${H - 28 - logoH - extraBottom - 10}" stroke="${C.border}" stroke-width="1"/>`
      : '';
    svgContent = `${titleBlock}${subcopyBlock}${chartBody}${bottomAccent}${sourceBlock}${logoBlock}`;
  }

  // Safe zone preview indicator (not exported)
  const safeZoneRect = is45 && state.layoutMode !== 'split'
    ? `<rect x="20" y="${extraTop}" width="${W - 40}" height="${H - extraTop - extraBottom}" fill="none" stroke="rgba(255,100,100,0.35)" stroke-width="1.5" stroke-dasharray="6,4"/>`
    : '';

  const borderStroke = `<rect x="0.5" y="0.5" width="${W - 1}" height="${H - 1}" fill="none" stroke="#00FF64" stroke-width="1"/>`;

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  ${backgroundLayer}
  ${svgContent}
  ${safeZoneRect}
  ${borderStroke}
</svg>`;

  const canvas = document.getElementById('chart-canvas');
  canvas.innerHTML = svg;

  // Scale preview to fit stage
  const stage = document.getElementById('preview-stage');
  const stageW = stage.clientWidth - 64;
  const stageH = stage.clientHeight - 64;
  const scale = Math.min(stageW / W, stageH / H, 1);
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
  canvas.querySelector('svg').setAttribute('width', W * scale);
  canvas.querySelector('svg').setAttribute('height', H * scale);

  // Update topbar
  document.getElementById('preview-dims').textContent = `${state.exportW} × ${state.exportH}`;
  document.getElementById('preview-info').textContent = `${CHART_NAMES[state.chartType]} · ${state.colorMode === 'light' ? 'Light' : 'Dark'}`;

  // Encode full state into URL so slide-gen can parse it back
  try {
    const snap = {
      type: state.chartType,
      title: document.getElementById('chart-title').value,
      subtitle: document.getElementById('chart-subtitle').value,
      subcopy: document.getElementById('chart-subcopy').value,
      data: document.getElementById('data-input').value,
      colorMode: state.colorMode,
      painting: state.paintingKey || '',
      layout: state.layoutMode,
      w: state.exportW,
      h: state.exportH,
      showLogo: document.getElementById('show-logo').checked,
      showSource: document.getElementById('show-source').checked,
      highlightIndex: (() => { const v = document.getElementById('highlight-select').value; return v === 'max' ? -1 : parseInt(v); })(),
    };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(snap))));
    history.replaceState(null, '', '?data=' + encoded);
  } catch(e) {}
}

// ── Export ────────────────────────────────────────────────────────────────────

// Shared SVG builder — used by downloadPNG and window.__exportToDataURL
function buildExportSVGStr() {
  const W = state.exportW, H = state.exportH;
  const C = state.paintingKey ? getPaintingColors() : COLORS[state.colorMode];
  const title = document.getElementById('chart-title').value || defaultTitles[state.chartType];
  const subtitle = document.getElementById('chart-subtitle').value || 'Source: AirOps Research, 2026';
  const rawData = document.getElementById('data-input').value;
  const data = parseData(rawData, state.chartType);
  const showLogo = document.getElementById('show-logo').checked;
  const showSource = document.getElementById('show-source').checked;
  const hiVal = document.getElementById('highlight-select').value;
  const hiIdx = hiVal === 'max' ? -1 : parseInt(hiVal);

  const VW = 800, VH = 800 * H / W;
  const is45 = H === 1350;
  const extraTop = is45 ? Math.round(VH * 0.13) : 0;
  const extraBottom = is45 ? Math.round(VH * 0.13) : 0;

  let backgroundLayer, svgContent;

  if (state.layoutMode === 'split') {
    backgroundLayer = '';
    svgContent = renderSplitLayout({ W: VW, H: VH, title, subtitle, data,
      showLogo, showSource, hiIdx, colorMode: state.colorMode, chartType: state.chartType });
  } else {
    backgroundLayer = state.paintingKey
      ? buildPaintingBackground(state.paintingKey, VW, VH, true)
      : `<rect width="${VW}" height="${VH}" fill="${C.bg}"/>`;

    const { svg: titleBlock, extraPt: extraTitlePt } = buildTitleSVG(title, VW, C, extraTop);
    const subcopy = document.getElementById('chart-subcopy').value;
    const { svg: subcopyBlock, height: subcopyHeight } = buildSubcopySVG(subcopy, VW, C, 52 + extraTop + extraTitlePt);
    const exportCfg = { colorMode: state.colorMode, highlightIndex: hiIdx, ptOffset: extraTitlePt + extraTop + subcopyHeight, extraTop, extraBottom };

    let chartBody = '';
    if (state.chartType === 'bar')    chartBody = renderBar(data, C, VW, VH, exportCfg);
    if (state.chartType === 'line')   chartBody = renderLine(data, C, VW, VH, exportCfg);
    if (state.chartType === 'ranked') chartBody = renderRanked(data, C, VW, VH, exportCfg);
    if (state.chartType === 'stat')   chartBody = renderStat(data, C, VW, VH, exportCfg);
    if (state.chartType === 'table')  chartBody = renderTable(data, C, VW, VH, exportCfg);
    if (state.chartType === 'pie')    chartBody = renderPie(data, C, VW, VH, exportCfg);

    const logoW = VW * 0.10;
    const logoH = logoW * 291 / 1179;
    const sourceBlock = showSource ? `<text x="40" y="${VH - 28 - extraBottom}" font-family="'Saans Mono','DM Mono',monospace" font-size="12" font-weight="500" letter-spacing="0.06em" fill="${C.subtitle}">${escSVG(subtitle.toUpperCase())}</text>` : '';
    const logoBlock = showLogo ? `<g transform="translate(${VW - 56 - logoW}, ${VH - 28 - logoH - extraBottom})">${lockupSVG(logoW, C.logoFill)}</g>` : '';
    const showBottomAccent = state.chartType === 'stat' || state.chartType === 'pie';
    const bottomAccent = showBottomAccent
      ? `<line x1="40" y1="${VH - 28 - logoH - extraBottom - 10}" x2="${VW - 40}" y2="${VH - 28 - logoH - extraBottom - 10}" stroke="${C.border}" stroke-width="1"/>`
      : '';
    svgContent = `${titleBlock}${subcopyBlock}${chartBody}${bottomAccent}${sourceBlock}${logoBlock}`;
  }

  const borderStroke = `<rect x="0.5" y="0.5" width="${VW - 1}" height="${VH - 1}" fill="none" stroke="#00FF64" stroke-width="1"/>`;
  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${VW} ${VH}" width="${W}" height="${H}">
  ${backgroundLayer}
  ${svgContent}
  ${borderStroke}
</svg>`;

  return { svgStr, W, H };
}

function downloadPNG() {
  const { svgStr, W, H } = buildExportSVGStr();
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    cv.getContext('2d').drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = `airops-dataviz-${state.chartType}-${W}x${H}.png`;
    a.href = cv.toDataURL('image/png');
    a.click();
    document.getElementById('download-btn').classList.remove('loading');
    document.getElementById('download-btn').textContent = 'Download PNG';
  };
  img.src = url;
}

// Used by the /api/dataviz serverless function via Puppeteer page.evaluate()
window.__exportToDataURL = function() {
  return new Promise(resolve => {
    const { svgStr, W, H } = buildExportSVGStr();
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = W; cv.height = H;
      cv.getContext('2d').drawImage(img, 0, 0, W, H);
      URL.revokeObjectURL(url);
      resolve(cv.toDataURL('image/png'));
    };
    img.src = url;
  });
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function escSVG(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function darkenHex(hex, amount) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return '#' + [r,g,b].map(c => Math.round(c*(1-amount)).toString(16).padStart(2,'0')).join('');
}

function renderPie(data, C, W, H, cfg) {
  const { labels, values } = data;
  const n = Math.min(labels.length, 8);
  const total = values.slice(0, n).reduce((a, b) => a + b, 0);
  if (!total) return '';

  const pb = Math.round(Math.max(80, Math.min(90, H * 0.112))) + (cfg.extraBottom || 0);
  const pt_base = Math.round(Math.max(76, Math.min(100, H * 0.125)));
  const pt = (cfg.basePt ?? pt_base) + (cfg.ptOffset || 0);

  const PALETTE = cfg.colorMode === 'dark'
    ? ['#005c2e','#8a9600','#00783e','#b0c000','#003d20','#6b7200','#00a050','#d4e000']
    : ['#CCFFE0','#EEFF8C','#7AF5C4','#DAFF44','#44E8A0','#F2FF22','#00D478','#C8FF4C'];

  const availH = H - pt - pb;
  const cx = W / 2;
  // Radius: leave 72px each side for callout labels, 52px bottom for legend
  const r = Math.round(Math.min((W - 144) / 2, (availH - 52) * 0.46));
  const cy = Math.round(pt + (availH - 52) * 0.48);

  // Slices
  let slices = '';
  const midAngles = [];
  const fracs = [];
  let angle = -Math.PI / 2;
  const dividerColor = C.bg === 'transparent' ? 'none' : C.bg;

  for (let i = 0; i < n; i++) {
    const frac = values[i] / total;
    fracs.push(frac);
    const sweep = frac * 2 * Math.PI;
    midAngles.push(angle + sweep / 2);
    const endAngle = angle + sweep;
    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    slices += `<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} A${r} ${r} 0 ${sweep > Math.PI ? 1 : 0} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} L${cx} ${cy} Z"
      fill="${PALETTE[i % PALETTE.length]}" stroke="${dividerColor}" stroke-width="2" stroke-linejoin="round"/>`;
    angle = endAngle;
  }

  // Percentage callouts (slices ≥ 4%)
  let labels_svg = '';
  for (let i = 0; i < n; i++) {
    if (fracs[i] < 0.04) continue;
    const ma = midAngles[i];
    const pct = Math.round(fracs[i] * 100);
    const tickR1 = r + 7, tickR2 = r + 19, labelR = r + 28;
    const anchor = Math.cos(ma) > 0.15 ? 'start' : Math.cos(ma) < -0.15 ? 'end' : 'middle';
    labels_svg += `<line x1="${(cx+tickR1*Math.cos(ma)).toFixed(1)}" y1="${(cy+tickR1*Math.sin(ma)).toFixed(1)}" x2="${(cx+tickR2*Math.cos(ma)).toFixed(1)}" y2="${(cy+tickR2*Math.sin(ma)).toFixed(1)}" stroke="${C.axisTick}" stroke-width="0.8"/>`;
    labels_svg += `<text x="${(cx+labelR*Math.cos(ma)).toFixed(1)}" y="${(cy+labelR*Math.sin(ma)).toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" font-family="'Saans Mono','DM Mono',monospace" font-size="12" font-weight="500" fill="${C.valueText}">${pct}%</text>`;
  }

  // Legend row below pie
  const legendTop = cy + r + 22;
  const cols = Math.min(n, 4);
  const colW = Math.round((W - 80) / cols);
  let legend = '';
  for (let i = 0; i < n; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const lx = 40 + col * colW, ly = legendTop + row * 16;
    const lbl = labels[i].length > 18 ? labels[i].slice(0, 16) + '…' : labels[i];
    legend += `<rect x="${lx}" y="${ly}" width="9" height="9" rx="1" fill="${PALETTE[i % PALETTE.length]}"/>`;
    legend += `<text x="${lx+13}" y="${ly+8}" font-family="'Saans Mono','DM Mono',monospace" font-size="11" fill="${C.axisTick}">${escSVG(lbl)}</text>`;
  }

  return `${slices}${labels_svg}${legend}`;
}

// ── Carousel render functions ─────────────────────────────────────────────────

function renderCarouselTitleSlide(slide, idx, total, C, W, H) {
  const title = slide.title || 'Your Headline Here';
  const subcopy = slide.subcopy || '';
  const fontSize = Math.min(W * 0.085, 72);
  const maxWidth = W - 80;
  const lines = wrapTextMulti(title, maxWidth, fontSize, 4, 0.50);
  const lineH = fontSize * 1.2;
  const totalTitleH = lines.length * lineH;
  const titleY = H * 0.42 - totalTitleH / 2 + fontSize;
  const tspans = lines.map((l, i) => `<tspan x="40" dy="${i === 0 ? 0 : lineH}">${escSVG(l)}</tspan>`).join('');
  let out = `<text x="40" y="${Math.round(titleY)}" font-family="'Serrif VF',Georgia,serif" font-size="${fontSize}" font-weight="400" letter-spacing="-0.02em" fill="${C.title}">${tspans}</text>`;

  if (subcopy) {
    const subY = Math.round(titleY + totalTitleH + 24);
    const subLines = wrapTextMulti(subcopy, maxWidth, 24, 3, 0.48);
    const subTspans = subLines.map((l, i) => `<tspan x="40" dy="${i === 0 ? 0 : 36}">${escSVG(l)}</tspan>`).join('');
    out += `<text x="40" y="${subY}" font-family="'Saans','Helvetica Neue',sans-serif" font-size="24" font-weight="400" fill="${C.subtitle}">${subTspans}</text>`;
  }

  // Logo bottom-left
  const logoW = W * 0.14;
  const logoH = logoW * 291 / 1179;
  out += `<g transform="translate(40, ${H - 36 - logoH})">${lockupSVG(logoW, C.logoFill)}</g>`;

  // Slide counter bottom-right
  out += `<text x="${W - 40}" y="${H - 30}" text-anchor="end" font-family="'Saans Mono','DM Mono',monospace" font-size="13" font-weight="500" letter-spacing="0.06em" fill="${C.subtitle}">${idx + 1} / ${total}</text>`;

  return out;
}

function renderCarouselDataSlide(slide, idx, total, C, W, H) {
  const header = slide.header || defaultTitles[slide.chartType] || 'Data';
  const subhead = slide.subhead || '';
  const rawData = slide.data || defaultData[slide.chartType] || '';
  const data = parseData(rawData, slide.chartType);
  const hiVal = slide.hiIdx ?? -1;

  const { svg: titleBlock, extraPt: extraTitlePt } = buildTitleSVG(header, W, C, 0);
  const { svg: subcopyBlock, height: subcopyH } = buildSubcopySVG(subhead, W, C, 52 + extraTitlePt);
  const cfg = { colorMode: 'custom', highlightIndex: hiVal, ptOffset: extraTitlePt + subcopyH, extraTop: 0, extraBottom: 40 };

  let chartBody = '';
  if (slide.chartType === 'bar')    chartBody = renderBar(data, C, W, H, cfg);
  if (slide.chartType === 'line')   chartBody = renderLine(data, C, W, H, cfg);
  if (slide.chartType === 'ranked') chartBody = renderRanked(data, C, W, H, cfg);
  if (slide.chartType === 'stat')   chartBody = renderStat(data, C, W, H, cfg);
  if (slide.chartType === 'table')  chartBody = renderTable(data, C, W, H, cfg);
  if (slide.chartType === 'pie')    chartBody = renderPie(data, C, W, H, cfg);

  // Logo bottom-left
  const logoW = W * 0.14;
  const logoH = logoW * 291 / 1179;
  const logoBlock = `<g transform="translate(40, ${H - 36 - logoH})">${lockupSVG(logoW, C.logoFill)}</g>`;

  // Slide counter bottom-right
  const counter = `<text x="${W - 40}" y="${H - 30}" text-anchor="end" font-family="'Saans Mono','DM Mono',monospace" font-size="13" font-weight="500" letter-spacing="0.06em" fill="${C.subtitle}">${idx + 1} / ${total}</text>`;

  return `${titleBlock}${subcopyBlock}${chartBody}${logoBlock}${counter}`;
}

function renderCarouselCTASlide(slide, idx, total, C, W, H) {
  const label    = slide.label       || '';
  const headline = slide.headline    || 'Ready to get started?';
  const subhead  = slide.subheadline || '';
  const subcopy  = slide.subcopy     || '';
  const cta      = slide.cta         || 'Book a Demo';
  const cta2     = slide.ctaSecondary || '';

  // Always dark brand style
  const TITLE  = '#f8fffa';
  const SUB    = 'rgba(255,255,255,0.60)';
  const BORDER = '#057a28';

  const ARROW_PATH = 'M1.99974 13.0001L1.9996 11.0002L18.1715 11.0002L14.2218 7.05044L15.636 5.63623L22 12.0002L15.636 18.3642L14.2218 16.9499L18.1716 13.0002L1.99974 13.0001Z';
  const ASC = 0.80; // arrow scale
  const ANW = 24 * ASC; // arrow natural width after scale

  // Helper: text + arrow centered in a button
  const btnLabel = (text, fill, cx, cy, sz = 20) => {
    const cw = sz * 0.52;
    const tw = text.length * cw;
    const gap = 10;
    const totalW = tw + gap + ANW;
    const tx = cx - totalW / 2;
    const ax = tx + tw + gap;
    const ay = cy - (24 * ASC) / 2;
    return `<text x="${tx}" y="${cy + sz * 0.37}" font-family="'Saans','Helvetica Neue',sans-serif" font-size="${sz}" font-weight="500" fill="${fill}">${escSVG(text)}</text><g transform="translate(${ax},${ay}) scale(${ASC})"><path d="${ARROW_PATH}" fill="${fill}"/></g>`;
  };

  let out = '';

  // Inner border
  out += `<rect x="12" y="12" width="${W-24}" height="${H-24}" fill="none" stroke="${BORDER}" stroke-width="1"/>`;

  // Badge at top center
  if (label) {
    const badgeTxt = label.toUpperCase();
    const badgeW = Math.max(badgeTxt.length * 8 + 40, 80);
    const badgeH = 30;
    out += `<rect x="${W/2 - badgeW/2}" y="56" width="${badgeW}" height="${badgeH}" rx="5" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>`;
    out += `<text x="${W/2}" y="${56 + badgeH * 0.66}" text-anchor="middle" font-family="'Saans Mono','DM Mono',monospace" font-size="12" font-weight="500" letter-spacing="0.08em" fill="rgba(255,255,255,0.60)">${escSVG(badgeTxt)}</text>`;
  }

  // Headline — two lines, line1 serif + line2 sans
  const fontSize = Math.min(W * 0.090, 76);
  const maxWidth = W - 100;
  const lineH = fontSize * 1.05;
  let y = label ? H * 0.30 : H * 0.28;

  if (headline) {
    const lines1 = wrapTextMulti(headline, maxWidth, fontSize, 3, 0.50);
    const ts1 = lines1.map((l, i) => `<tspan x="${W/2}" dy="${i === 0 ? 0 : lineH}">${escSVG(l)}</tspan>`).join('');
    out += `<text x="${W/2}" y="${Math.round(y)}" text-anchor="middle" font-family="'Serrif VF',Georgia,serif" font-size="${fontSize}" font-weight="400" letter-spacing="-0.03em" fill="${TITLE}">${ts1}</text>`;
    y += lines1.length * lineH;
  }
  if (subhead) {
    const lines2 = wrapTextMulti(subhead, maxWidth, fontSize, 2, 0.50);
    const ts2 = lines2.map((l, i) => `<tspan x="${W/2}" dy="${i === 0 ? 0 : lineH}">${escSVG(l)}</tspan>`).join('');
    out += `<text x="${W/2}" y="${Math.round(y)}" text-anchor="middle" font-family="'Saans','Helvetica Neue',sans-serif" font-size="${fontSize}" font-weight="400" letter-spacing="-0.02em" fill="${TITLE}">${ts2}</text>`;
    y += lines2.length * lineH;
  }

  // Body copy
  if (subcopy) {
    y += 28;
    const subLines = wrapTextMulti(subcopy, maxWidth - 60, 20, 3, 0.48);
    const subTs = subLines.map((l, i) => `<tspan x="${W/2}" dy="${i === 0 ? 0 : 30}">${escSVG(l)}</tspan>`).join('');
    out += `<text x="${W/2}" y="${Math.round(y)}" text-anchor="middle" font-family="'Saans','Helvetica Neue',sans-serif" font-size="20" font-weight="400" fill="${SUB}">${subTs}</text>`;
    y += subLines.length * 30;
  }

  // Buttons — pill shape
  const btnY = Math.max(y + 48, H * 0.60);
  const btnH = 64;
  const btnRx = btnH / 2;

  if (cta2) {
    const gap = 16;
    const btnW = Math.min((W - 80 - gap) / 2, 300);
    const startX = W / 2 - (btnW * 2 + gap) / 2;
    out += `<rect x="${startX}" y="${btnY}" width="${btnW}" height="${btnH}" rx="${btnRx}" fill="#00ff64"/>`;
    out += btnLabel(cta, '#002910', startX + btnW / 2, btnY + btnH / 2);
    const b2x = startX + btnW + gap;
    out += `<rect x="${b2x}" y="${btnY}" width="${btnW}" height="${btnH}" rx="${btnRx}" fill="rgba(0,0,0,0.30)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>`;
    out += btnLabel(cta2, '#f8fffa', b2x + btnW / 2, btnY + btnH / 2);
  } else {
    const btnW = Math.min(W * 0.55, 340);
    const btnX = W / 2 - btnW / 2;
    out += `<rect x="${btnX}" y="${btnY}" width="${btnW}" height="${btnH}" rx="${btnRx}" fill="#00ff64"/>`;
    out += btnLabel(cta, '#002910', W / 2, btnY + btnH / 2);
  }

  // Logo bottom-left
  const logoW = W * 0.14;
  const logoH = logoW * 291 / 1179;
  out += `<g transform="translate(40, ${H - 36 - logoH})">${lockupSVG(logoW, C.logoFill)}</g>`;

  // Slide counter bottom-right
  out += `<text x="${W-40}" y="${H-30}" text-anchor="end" font-family="'Saans Mono','DM Mono',monospace" font-size="13" font-weight="500" letter-spacing="0.06em" fill="rgba(255,255,255,0.40)">${idx + 1} / ${total}</text>`;

  return out;
}

function buildCarouselSlideSVG(slide, idx, W, H, forExport = false) {
  const total = state.carouselSlides.length;
  const C = CAROUSEL_COLORWAYS[state.carouselColorway];
  const bgColor = slide.type === 'cta' ? '#002910' : C.bg;
  const bgRect = `<rect width="${W}" height="${H}" fill="${bgColor}"/>`;
  const border = `<rect x="0.5" y="0.5" width="${W-1}" height="${H-1}" fill="none" stroke="#00FF64" stroke-width="1"/>`;

  // Next arrow (uploaded arrow-right-long-line icon) — all slides except last
  const isLast = idx === total - 1;
  const arrowX = W - 38, arrowY = H / 2;
  const circleStroke = slide.type === 'cta' ? 'rgba(255,255,255,0.25)' : C.subtitle;
  const arrowFill   = slide.type === 'cta' ? 'rgba(255,255,255,0.70)' : C.title;
  const s = 0.72, ax = arrowX - 12 * s, ay = arrowY - 12 * s;
  const nextArrow = !isLast && slide.type !== 'cta' ? `<g opacity="0.45">
    <circle cx="${arrowX}" cy="${arrowY}" r="22" fill="none" stroke="${circleStroke}" stroke-width="1.5"/>
    <g transform="translate(${ax},${ay}) scale(${s})"><path d="M1.99974 13.0001L1.9996 11.0002L18.1715 11.0002L14.2218 7.05044L15.636 5.63623L22 12.0002L15.636 18.3642L14.2218 16.9499L18.1716 13.0002L1.99974 13.0001Z" fill="${arrowFill}"/></g>
  </g>` : '';

  let body = '';
  if (slide.type === 'title') body = renderCarouselTitleSlide(slide, idx, total, C, W, H);
  else if (slide.type === 'cta') body = renderCarouselCTASlide(slide, idx, total, C, W, H);
  else body = renderCarouselDataSlide(slide, idx, total, C, W, H);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  ${bgRect}${body}${nextArrow}${border}
</svg>`;
}

function renderCarouselPreview() {
  const W = 800, H = 800; // always square
  const slide = state.carouselSlides[state.carouselActiveSlide];
  const svg = buildCarouselSlideSVG(slide, state.carouselActiveSlide, W, H, false);
  const canvas = document.getElementById('chart-canvas');
  canvas.innerHTML = svg;
  // Scale to fit stage
  const stage = document.getElementById('preview-stage');
  const stageW = stage.clientWidth - 64, stageH = stage.clientHeight - 64;
  const scale = Math.min(stageW / W, stageH / H, 1);
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
  canvas.querySelector('svg').setAttribute('width', W * scale);
  canvas.querySelector('svg').setAttribute('height', H * scale);
  // Topbar
  const total = state.carouselSlides.length;
  document.getElementById('preview-dims').textContent = '1080 × 1080';
  document.getElementById('preview-info').textContent = `Slide ${state.carouselActiveSlide + 1} of ${total} · Carousel`;
}

// ── Slide list management ─────────────────────────────────────────────────────

function rebuildSlideList() {
  const list = document.getElementById('carousel-slide-list');
  const slides = state.carouselSlides;
  list.innerHTML = slides.map((s, i) => {
    const isActive = i === state.carouselActiveSlide;
    const label = s.type === 'title' ? 'Cover' : s.type === 'cta' ? (s.headline || 'CTA Slide') : (s.header || defaultTitles[s.chartType] || 'Data Slide');
    const canRemove = s.type !== 'title' && slides.length > 2;
    return `<div class="carousel-slide-item${isActive ? ' active' : ''}" data-idx="${i}">
      <span class="carousel-slide-num">${i + 1}</span>
      <span class="carousel-slide-label">${escSVG(label)}</span>
      ${canRemove ? `<button class="carousel-slide-remove" data-remove="${i}" title="Remove">×</button>` : ''}
    </div>`;
  }).join('');
}

function updateCarouselHighlightSelect(slide) {
  const sel = document.getElementById('carousel-highlight-select');
  const rawData = slide.data || defaultData[slide.chartType] || '';
  const data = parseData(rawData, slide.chartType);
  const opts = ['<option value="max">Highest value (auto)</option>'];
  if (data.labels) {
    data.labels.forEach((l, i) => opts.push(`<option value="${i}">${escSVG(l)}</option>`));
  }
  sel.innerHTML = opts.join('');
  sel.value = slide.hiIdx !== undefined && slide.hiIdx >= 0 ? slide.hiIdx : 'max';
}

function loadSlideToEditor(idx) {
  state.carouselActiveSlide = idx;
  const slide = state.carouselSlides[idx];
  const titleEditor = document.getElementById('slide-editor-title');
  const dataEditor  = document.getElementById('slide-editor-data');
  const ctaEditor   = document.getElementById('slide-editor-cta');

  titleEditor.style.display = 'none';
  dataEditor.style.display  = 'none';
  ctaEditor.style.display   = 'none';

  if (slide.type === 'title') {
    titleEditor.style.display = '';
    document.getElementById('carousel-title').value = slide.title || '';
    document.getElementById('carousel-subcopy').value = slide.subcopy || '';
  } else if (slide.type === 'cta') {
    ctaEditor.style.display = '';

}

// ── PDF export ────────────────────────────────────────────────────────────────

function svgToCanvasDataURL(svgStr, W, H) {
  return new Promise(resolve => {
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = W; cv.height = H;
      cv.getContext('2d').drawImage(img, 0, 0, W, H);
      URL.revokeObjectURL(url);
      resolve(cv.toDataURL('image/png'));
    };
    img.src = url;
  });
}

async function downloadCarouselPDF() {
  const { jsPDF } = window.jspdf;
  // CTA slides always last in export order
  const slides = [
    ...state.carouselSlides.filter(s => s.type !== 'cta'),
    ...state.carouselSlides.filter(s => s.type === 'cta'),
  ];
  const W = 1080, H = 1080, VW = 800, VH = 800;
  const pdf = new jsPDF({ unit: 'px', format: [W, H], hotfixes: ['px_scaling'] });

  for (let i = 0; i < slides.length; i++) {
    const svgStr = buildCarouselSlideSVG(slides[i], i, VW, VH, false);
    const dataURL = await svgToCanvasDataURL(svgStr, W, H);
    if (i > 0) pdf.addPage([W, H]);
    pdf.addImage(dataURL, 'PNG', 0, 0, W, H);
  }
  pdf.save('airops-carousel.pdf');
  document.getElementById('download-btn').classList.remove('loading');
  document.getElementById('download-btn').textContent = 'Download PDF';
}

// ── Query-param pre-population (used by /api/dataviz) ─────────────────────────
// Accepts ?data=<base64-encoded-JSON> with keys:
//   type, title, subcopy, subtitle, data, colorMode, layout, painting, w, h, showLogo, showSource
function loadFromQuery() {
  const raw = new URLSearchParams(window.location.search).get('data');
  if (!raw) return false;
  let p;
  try { p = JSON.parse(decodeURIComponent(escape(atob(raw.replace(/ /g, '+'))))); } catch { return false; }

  if (p.type && CHART_NAMES[p.type]) {
    state.chartType = p.type;
    document.querySelectorAll('.chart-type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === p.type));
    if (p.type === 'carousel') { showCarouselPanel(); } else { showStandardSections(); }
    document.getElementById('data-hint').textContent = dataHints[p.type] || 'One per line — Label: Value';
    document.getElementById('highlight-group').style.display = ['bar','line','ranked'].includes(p.type) ? '' : 'none';
  }
  if (p.title    !== undefined) document.getElementById('chart-title').value    = p.title;
  if (p.subcopy  !== undefined) document.getElementById('chart-subcopy').value  = p.subcopy;
  if (p.subtitle !== undefined) document.getElementById('chart-subtitle').value = p.subtitle;
  if (p.data     !== undefined) { document.getElementById('data-input').value = p.data; document.getElementById('data-input').dataset.userEdited = '1'; }
  if (p.colorMode && COLORS[p.colorMode]) {
    state.colorMode = p.colorMode;
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === p.colorMode));
  }
  if (p.layout && ['standard','split'].includes(p.layout)) {
    state.layoutMode = p.layout;
    document.querySelectorAll('#layout-grid .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.layout === p.layout));
  }
  if (p.painting !== undefined) {
    state.paintingKey = p.painting || null;
    document.querySelectorAll('.painting-btn').forEach(b => b.classList.toggle('active', b.dataset.painting === (p.painting || 'none')));
  }
  if (p.w && p.h) {
    state.exportW = p.w; state.exportH = p.h;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.w) === p.w && parseInt(b.dataset.h) === p.h));
  }
  if (p.showLogo  !== undefined) document.getElementById('show-logo').checked   = !!p.showLogo;
  if (p.showSource !== undefined) document.getElementById('show-source').checked = !!p.showSource;
  updateHighlightOptions();
  return true;
}
